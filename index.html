<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TETRIS NÉON // 2084</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>TETRIS NÉON</h1>
      <p class="subtitle">2084 • CYBERPUNK EDITION</p>
    </header>

    <div class="game-wrapper" style="position: relative;">
      <canvas id="board" width="320" height="640"></canvas>

      <!-- HUD flottant -->
      <div class="floating-hud">
        <div class="hud-item"><div class="hud-label">SCORE</div><div id="score">000000</div></div>
        <div class="hud-item"><div class="hud-label">NIVEAU</div><div id="level">01</div></div>
        <div class="hud-item"><div class="hud-label">LIGNES</div><div id="lines">000</div></div>
        <div class="hud-item next"><div class="hud-label">SUIVANTE</div><canvas id="next-piece" width="82" height="82"></canvas></div>
      </div>

      <!-- Boutons bulles Game Boy style -->
      <div class="controls-overlay">
        <!-- 3 boutons à gauche -->
        <div class="controls-left">
          <button onclick="moveLeft()">⬅️</button>
          <button onclick="softDrop()">⬇️</button>
          <button onclick="moveRight()">➡️</button>
        </div>

        <!-- 2 boutons à droite -->
        <div class="controls-right">
          <button class="rotate" onclick="rotatePiece()">⟳</button>
          <button class="hard-drop" onclick="hardDrop()">⏬</button>
        </div>
      </div>

      <!-- Overlays -->
      <div id="start-overlay" class="start-overlay active">
        <div class="overlay-content">
          <h2 style="color:#00f9ff;">BIENVENUE DANS LE FUTUR</h2>
          <p>Prêt à empiler des blocs néon ?</p>
          <button onclick="startGame()">LANCER LE JEU</button>
        </div>
      </div>

      <div id="pause-overlay" class="pause-overlay">
        <div class="overlay-content">
          <h2 style="color:#ffea00;">PAUSE</h2>
          <button onclick="togglePause()">REPRENDRE</button>
        </div>
      </div>

      <div id="game-over-overlay" class="game-over-overlay">
        <div class="overlay-content">
          <h2 style="color:#ff2e63;">GAME OVER</h2>
          <p id="final-score">Score final : 000000</p>
          <button onclick="restartGame()">RECOMMENCER</button>
        </div>
      </div>
    </div>

    <div class="instructions">
      Swipe sur le plateau ou utilise les boutons bulles. 3 à gauche • 2 à droite (style Game Boy)
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
