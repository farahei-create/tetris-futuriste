<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TETRIS NÉON // 2084</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>TETRIS NÉON</h1>
      <p class="subtitle">2084 • CYBERPUNK EDITION</p>
    </header>

    <div class="game-wrapper" style="position: relative;">
      <!-- Bouton HOLD (uniquement visible pour les Supporters) -->
<div id="hold-container" style="position: absolute; top: 42%; left: -58px; z-index: 20; display: none;">
  <button id="hold-btn" onclick="holdPiece()" 
          style="width: 50px; height: 50px; font-size: 0.85rem; font-weight: 700; 
                 border-radius: 10px; background: rgba(25, 18, 45, 0.6); color: #ffd700; 
                 border: 2px solid #ffd700; box-shadow: 0 0 10px #ffd700;">
    HOLD
  </button>
</div>
      <div class="holo-frame"></div>
      <canvas id="board" width="320" height="640"></canvas>

      <!-- HUD -->
      <div class="floating-hud">
        <div class="hud-panel left">
          <div class="hud-item"><div class="hud-label">SCORE</div><div id="score">000000</div></div>
          <div class="hud-item"><div class="hud-label">NIVEAU</div><div id="level">01</div></div>
          <div class="hud-item"><div class="hud-label">LIGNES</div><div id="lines">000</div></div>
        </div>

        <div class="hud-panel right">
          <div class="hud-item next">
  <div class="hud-label">SUIVANTE</div>
  <div style="display: flex; gap: 8px; align-items: center;">
    <canvas id="next-piece" width="70" height="70"></canvas>
    <!-- Deuxième pièce (visible seulement pour Supporters) -->
    <canvas id="next-piece-2" width="50" height="50" 
            style="display: none; border: 1px solid #ffd700; border-radius: 5px;"></canvas>
  </div>
</div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-overlay minimal">
        <div class="controls-left">
          <button class="control-btn" onclick="moveLeft()" aria-label="Gauche">←</button>
          <button class="control-btn" onclick="softDrop()" aria-label="Bas">↓</button>
          <button class="control-btn" onclick="moveRight()" aria-label="Droite">→</button>
        </div>

        <div class="controls-right">
          <button class="control-btn rotate" onclick="rotatePiece()" aria-label="Rotation">↻</button>
          <button class="control-btn hard-drop" onclick="hardDrop()" aria-label="Chute rapide">⇩</button>
        </div>
      </div>

      <!-- Hold Button (uniquement pour Supporters) -->
      <div id="hold-container" style="position: absolute; top: 45%; left: -60px; transform: translateY(-50%); z-index: 20; display: none;">
        <button id="hold-btn" onclick="holdPiece()" 
                style="width: 52px; height: 52px; font-size: 0.85rem; font-weight: 700; 
                       border-radius: 10px; background: rgba(20,15,35,0.6); color: #ffd700; 
                       border: 2px solid #ffd700; box-shadow: 0 0 12px #ffd700;">
          HOLD
        </button>
      </div>

      <!-- Overlays -->
      <div id="start-overlay" class="start-overlay active">
        <div class="overlay-content">
          <h2>BIENVENUE DANS LE FUTUR</h2>
          <p>Prêt à empiler des blocs néon ?</p>
          <button onclick="startGame()">LANCER LE JEU</button>
        </div>
      </div>

      <div id="pause-overlay" class="pause-overlay">
        <div class="overlay-content">
          <h2>PAUSE</h2>
          <button onclick="togglePause()">REPRENDRE</button>
        </div>
      </div>

      <div id="game-over-overlay" class="game-over-overlay">
        <div class="overlay-content">
          <h2>GAME OVER</h2>
          <p id="final-score">Score final : 000000</p>
          <button onclick="restartGame()">RECOMMENCER</button>
        </div>
      </div>
    </div>

    <div class="instructions">
      Glisse sur le plateau pour jouer • Appuie pour tourner
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
